name: Claude Code target drift check

on:
  push:
    paths:
      - '.cursor/**'
      - '.cursorrules'
      - '.claude/**'
      - '.mcp.json'
      - 'scripts/build-claude-target.py'
  pull_request:
    paths:
      - '.cursor/**'
      - '.cursorrules'
      - '.claude/**'
      - '.mcp.json'
      - 'scripts/build-claude-target.py'

jobs:
  drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Verify generated .claude/ tree matches .cursor/
        run: python3 scripts/build-claude-target.py --check
